<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLX People Leader Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif;background:linear-gradient(180deg,#EAF4FE 0%,#DCEBFA 100%);min-height:100vh;color:#14265C;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,95,214,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(30,95,214,0.05) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:22px 16px 60px;}
.lang-tg{position:fixed;top:12px;right:12px;z-index:110;display:flex;border-radius:100px;overflow:hidden;border:1px solid rgba(30,95,214,0.35);background:rgba(255,255,255,0.9);}
.lang-tg button{padding:7px 16px;border:none;background:transparent;color:rgba(20,38,92,0.55);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;}
.lang-tg button.on{background:linear-gradient(135deg,#1E5FD6,#29ABE2);color:#fff;}
.card{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border:1px solid rgba(30,95,214,0.25);border-radius:22px;padding:28px 24px;box-shadow:0 8px 32px rgba(20,60,140,0.08);}
.logo{display:block;max-height:64px;width:auto;margin:0 auto 16px;}
.logo.sm{max-height:44px;margin-bottom:10px;}
.lbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(30,95,214,0.1);border:1px solid rgba(30,95,214,0.3);border-radius:100px;padding:7px 18px;font-size:12px;font-weight:600;letter-spacing:1.5px;color:#1E5FD6;text-transform:uppercase;margin-bottom:18px;}
h1{font-size:24px;line-height:1.25;margin-bottom:8px;}
h1 span{display:block;font-size:16px;background:linear-gradient(135deg,#1E5FD6,#29ABE2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{font-size:13.5px;color:rgba(20,38,92,0.7);line-height:1.65;margin-bottom:16px;}
.anchor{font-size:12.5px;line-height:1.7;color:#B36D00;background:rgba(255,209,102,0.18);border:1px solid rgba(255,209,102,0.5);border-radius:14px;padding:12px 15px;margin-bottom:18px;}
label{display:block;font-size:12px;font-weight:700;margin:14px 0 6px;color:rgba(20,38,92,0.8);}
input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(30,95,214,0.3);font-family:inherit;font-size:14px;color:#14265C;background:#fff;outline:none;}
input:focus{border-color:#1E5FD6;box-shadow:0 0 0 3px rgba(30,95,214,0.12);}
.btn{width:100%;margin-top:20px;padding:14px;border-radius:14px;background:linear-gradient(135deg,#1E5FD6,#1648B0);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(30,95,214,0.3);transition:transform .15s;}
.btn:hover{transform:translateY(-1px);}
.btn.gold{background:linear-gradient(135deg,#FFD166,#FF9A3C);color:#3a2600;box-shadow:0 4px 20px rgba(255,180,80,0.35);}
.err{color:#D6336C;font-size:12px;margin-top:8px;display:none;}
/* progress */
.prog{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.pbar{flex:1;height:8px;border-radius:100px;background:rgba(30,95,214,0.12);overflow:hidden;}
.pfill{height:100%;border-radius:100px;background:linear-gradient(90deg,#1E5FD6,#29ABE2);width:0%;transition:width .35s;}
.pnum{font-size:12px;font-weight:700;color:#1E5FD6;white-space:nowrap;}
.qtxt{font-size:15.5px;line-height:1.65;font-weight:600;margin-bottom:18px;}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid rgba(30,95,214,0.25);border-radius:14px;padding:13px 15px;margin-bottom:10px;font-family:inherit;font-size:13.5px;line-height:1.6;color:#14265C;cursor:pointer;transition:all .15s;}
.opt:hover{border-color:#1E5FD6;background:rgba(30,95,214,0.05);}
.opt.sel{border-color:#1E5FD6;background:rgba(30,95,214,0.12);box-shadow:0 0 0 3px rgba(30,95,214,0.1);}
.opt .ltr{display:inline-block;font-weight:700;color:#1E5FD6;margin-right:8px;}
.navrow{display:flex;gap:10px;margin-top:8px;}
.btn-back{flex:0 0 auto;padding:12px 18px;border-radius:14px;background:transparent;border:1.5px solid rgba(30,95,214,0.3);color:rgba(20,38,92,0.7);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
/* result */
.hero{text-align:center;padding:6px 0 14px;}
.hero .hic{font-size:60px;line-height:1;animation:pop .5s cubic-bezier(.2,1.6,.4,1);}
@keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
.hero .hnm{font-size:24px;font-weight:700;margin-top:10px;}
.hero .hcd{font-size:13px;color:#1E5FD6;font-weight:700;margin-top:2px;letter-spacing:1px;}
.co-dom{font-size:12px;color:#B36D00;background:rgba(255,209,102,0.18);border:1px solid rgba(255,209,102,0.5);border-radius:100px;display:inline-block;padding:5px 14px;margin-top:10px;}
.bars{margin:18px 0;}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.brow .bl{flex:0 0 118px;font-size:12px;font-weight:600;text-align:right;}
.brow .btr{flex:1;height:16px;border-radius:100px;background:rgba(30,95,214,0.1);overflow:hidden;}
.brow .bf{height:100%;border-radius:100px;background:linear-gradient(90deg,#1E5FD6,#29ABE2);width:0%;transition:width .8s ease;}
.brow.win .bf{background:linear-gradient(90deg,#FFD166,#FF9A3C);}
.brow .bn{flex:0 0 22px;font-size:12px;font-weight:700;color:#1E5FD6;}
.rbox{border-radius:16px;padding:14px 16px;margin-bottom:10px;font-size:13px;line-height:1.7;}
.rbox.good{background:rgba(30,95,214,0.07);border:1px solid rgba(30,95,214,0.25);}
.rbox.blind{background:rgba(214,51,108,0.06);border:1px solid rgba(214,51,108,0.3);}
.rbox b{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.rbox.good b{color:#1E5FD6;}
.rbox.blind b{color:#D6336C;}
.closing{font-size:13px;line-height:1.75;text-align:center;color:rgba(20,38,92,0.75);background:rgba(255,209,102,0.15);border:1px solid rgba(255,209,102,0.45);border-radius:16px;padding:14px 16px;margin-top:14px;}
.savest{text-align:center;font-size:12.5px;margin-top:14px;font-weight:600;}
.savest.ok{color:#1E7C4F;}
.savest.wait{color:#B36D00;}
.savest.fail{color:#D6336C;}
.remember{text-align:center;font-size:13px;font-weight:700;color:#1E5FD6;margin-top:6px;}
.hide{display:none;}
</style>
</head>

const LETTERS=['A','B','C','D'];
let answers=new Array(QUESTIONS.length).fill(null); // stores option index
let qi=0;
function T(k){return UI[k][LANG];}
function applyLang(){
  document.querySelectorAll('[data-t]').forEach(el=>{el.innerHTML=T(el.dataset.t);});
  document.getElementById('lg-th').classList.toggle('on',LANG==='th');
  document.getElementById('lg-en').classList.toggle('on',LANG==='en');
  if(!document.getElementById('step-q').classList.contains('hide'))renderQ();
  if(!document.getElementById('step-r').classList.contains('hide'))renderResult(false);
  document.documentElement.lang=LANG;
}
document.getElementById('lg-th').addEventListener('click',()=>{LANG='th';applyLang();});
document.getElementById('lg-en').addEventListener('click',()=>{LANG='en';applyLang();});

document.getElementById('btn-begin').addEventListener('click',()=>{
  const n=document.getElementById('f-name').value.trim();
  const d=document.getElementById('f-dept').value.trim();
  if(!n||!d){document.getElementById('intro-err').style.display='block';return;}
  document.getElementById('step-intro').classList.add('hide');
  document.getElementById('step-q').classList.remove('hide');
  qi=0;renderQ();window.scrollTo(0,0);
});
function renderQ(){
  const q=QUESTIONS[qi];
  document.getElementById('pfill').style.width=((qi)/QUESTIONS.length*100)+'%';
  document.getElementById('pnum').textContent=T('q_of').replace('{a}',qi+1).replace('{b}',QUESTIONS.length);
  document.getElementById('qtxt').textContent=(qi+1)+'. '+q.q[LANG];
  const box=document.getElementById('opts');box.innerHTML='';
  q.o.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(answers[qi]===i?' sel':'');
    b.innerHTML=`<span class="ltr">${LETTERS[i]}</span>${o[LANG]}`;
    b.addEventListener('click',()=>{
      answers[qi]=i;renderQ();
      setTimeout(()=>{ qi<QUESTIONS.length-1 ? (qi++,renderQ(),window.scrollTo(0,0)) : finish(); },280);
    });
    box.appendChild(b);
  });
  document.getElementById('btn-back').style.visibility=qi===0?'hidden':'visible';
}
document.getElementById('btn-back').addEventListener('click',()=>{if(qi>0){qi--;renderQ();}});

function computeScores(){
  const sc={s1:0,s2:0,s3:0,s4:0};
  answers.forEach((a,i)=>{if(a!=null)sc[QUESTIONS[i].o[a].s]++;});
  return sc;
}
function dominant(sc){
  const max=Math.max(sc.s1,sc.s2,sc.s3,sc.s4);
  let tied=Object.keys(sc).filter(k=>sc[k]===max);
  let co=false;
  if(tied.length>1){
    co=true;
    // tie-breaker: pressure questions Q3 (index 2) & Q8 (index 7)
    const votes={};tied.forEach(k=>votes[k]=0);
    [2,7].forEach(i=>{const s=QUESTIONS[i].o[answers[i]].s;if(votes[s]!=null)votes[s]++;});
    const vmax=Math.max(...tied.map(k=>votes[k]));
    const t2=tied.filter(k=>votes[k]===vmax);
    tied=t2;
  }
  return {dom:tied[0],co};
}
function finish(){
  document.getElementById('pfill').style.width='100%';
  document.getElementById('step-q').classList.add('hide');
  document.getElementById('step-r').classList.remove('hide');
  renderResult(true);window.scrollTo(0,0);
}
function renderResult(save){
  const sc=computeScores();
  const {dom,co}=dominant(sc);
  const st=STYLES[dom];
  document.getElementById('r-ic').textContent=st.ic;
  document.getElementById('r-nm').textContent=st.nm[LANG];
  document.getElementById('r-cd').textContent=st.cd;
  const coEl=document.getElementById('r-co');
  coEl.classList.toggle('hide',!co);
  if(co)coEl.textContent=T('co_dom');
  document.getElementById('r-str').textContent=st.str[LANG];
  document.getElementById('r-bld').textContent=st.bld[LANG];
  const bars=document.getElementById('r-bars');bars.innerHTML='';
  ['s1','s2','s3','s4'].forEach(k=>{
    const row=document.createElement('div');row.className='brow'+(k===dom?' win':'');
    row.innerHTML=`<div class="bl">${STYLES[k].ic} ${STYLES[k].nm[LANG]}</div><div class="btr"><div class="bf"></div></div><div class="bn">${sc[k]}</div>`;
    bars.appendChild(row);
    requestAnimationFrame(()=>{setTimeout(()=>{row.querySelector('.bf').style.width=(sc[k]/QUESTIONS.length*100)+'%';},60);});
  });
  if(save)saveResult(sc,dom,co);
}
function saveResult(sc,dom,co){
  const el=document.getElementById('savest');
  if(!SHEET_ENDPOINT||SHEET_ENDPOINT.indexOf('PASTE_YOUR')===0){
    el.className='savest fail';el.textContent=T('sv_noend');return;
  }
  el.className='savest wait';el.textContent=T('sv_wait');
  const ansStr=answers.map((a,i)=>(i+1)+LETTERS[a]).join(' ');
  const payload={
    name:document.getElementById('f-name').value.trim(),
    dept:document.getElementById('f-dept').value.trim(),
    s1:sc.s1,s2:sc.s2,s3:sc.s3,s4:sc.s4,
    dominant:STYLES[dom].cd+(co?' (tie-break)':''),
    answers:ansStr,lang:LANG
  };
  fetch(SHEET_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(()=>{el.className='savest ok';el.textContent=T('sv_ok');})
    .catch(()=>{el.className='savest fail';el.textContent=T('sv_fail');});
}
applyLang();
</script>
